name: Tests & Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Tests & Docs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'sbt'

      - uses: sbt/setup-sbt@e715b8047c687ff1876ac60506bcec7d5d88c7e1 # v1

      - name: Clean, test, and generate docs
        run: sbt clean test doc
