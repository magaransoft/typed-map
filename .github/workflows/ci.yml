name: Tests & Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Tests & Docs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'sbt'

      - uses: sbt/setup-sbt@e715b8047c687ff1876ac60506bcec7d5d88c7e1 # v1

      - name: Clean, test, and generate docs
        run: sbt clean test doc
